name: aura_plus
description: >-
  AURA+ is an AR-assisted therapy vocabulary trainer with offline-first content packs
  and pronunciation feedback, built with Flutter, Riverpod, and Clean Architecture.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.4.10
  go_router: ^13.2.1
  ar_flutter_plugin: ^1.0.7
  model_viewer_plus: ^1.7.0
  google_speech: ^3.2.1
  flutter_tts: ^3.7.0
  permission_handler: ^11.0.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  dio: ^5.4.0
  intl: ^0.18.1
  firebase_core: ^2.24.2
  firebase_analytics: ^10.7.2
  firebase_crashlytics: ^3.4.3
  collection: ^1.18.0
  equatable: ^2.0.5
  uuid: ^4.3.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.3
  very_good_analysis: ^5.1.0
  dart_code_metrics: ^5.7.6

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/audio/
    - assets/lottie/
    - assets/i18n/
    - assets/content_packs/
  generate: true
